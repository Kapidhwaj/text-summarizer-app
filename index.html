<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       :root {
    --bg-color: #ffffff;         
    --card-bg: #e6f0eb;          
    --text-main: #14362a;        
    --text-muted: #4a6a5e;       
    --accent: #276749;           
    --accent-hover: #1c4a35;     
    --accent-light: #ffffff;     
    --border-color: #c7dcd0;     
    --shadow-premium: 0 30px 70px rgba(39, 103, 73, 0.15); 
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
}

.container {
    background-color: var(--card-bg);
    width: 100%;
    max-width: 850px; 
    padding: 60px 50px;
    border-radius: 24px;
    box-shadow: var(--shadow-premium);
    border: 1px solid var(--border-color);
}


h1, .container > h3, .container > p {
    text-align: center;
}

h1 {
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text-main);
    margin-bottom: 6px;
}

.container > h3 {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 18px;
}

.container > p {
    color: var(--text-muted);
    font-size: 1.05rem;
    max-width: 540px;
    margin: 0 auto 45px auto;
    line-height: 1.6;
}

#summarization-form {
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-bottom: 45px;
}

textarea {
    width: 100%;
    height: 220px;
    padding: 22px;
    background-color: #ffffff; 
    color: var(--text-main);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    font-size: 1.05rem;
    line-height: 1.75;
    resize: vertical;
    outline: none;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

textarea:focus {
    border-color: var(--accent);
    background-color: #ffffff;
    box-shadow: 0 0 0 4px rgba(46, 82, 55, 0.08);
}

textarea::placeholder {
    color: #a4b0a8;
}

button {
    background-color: var(--accent);
    color: #ffffff;
    border: none;
    padding: 16px 40px;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 18px;
    cursor: pointer;
    align-self: center; 
    min-width: 220px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(46, 82, 55, 0.15);
}

button:hover {
    background-color: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(46, 82, 55, 0.25);
}

button:active {
    transform: translateY(1px);
}

#summary-output {
    background-color: var(--accent-light);
    border-radius: 18px;
    padding: 32px 35px;
    border: 1px solid var(--border-color);
    margin-top: 15px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.01);
}

#summary-heading {
    text-align: center; 
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-main);
    text-transform: none;
    letter-spacing: normal;
    margin-bottom: 16px;
}

#summary-text {
    color: #242c26;
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 0;
    text-align: center;
}
    </style>
</head>
<body>
    <div class = "container">
        <h1>Text Summarizer</h1>
        <h3>using HuggingFace Transformer</h3>
        <p>Enter your dialogue/content below to summarize</p>

        <form id = "summarization-form">
            <textarea id = "dialogue-input" placeholder = "Enter content here..." required></textarea>
            <button type = "submit">Summarize</button>
        </form>
        <div id = "summary-output">
            <h3 id = "summary-heading">Content Summary</h3>
            <p id = "summary-text"></p>
        </div>
    </div>
    <script>
        document.getElementById('summarization-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const dialogueInput = document.getElementById('dialogue-input').value;
        const summaryText = document.getElementById('summary-text');
        const submitButton = this.querySelector('button[type="submit"]');

        //Enter UI Loading State
        submitButton.disabled = true;
        submitButton.innerText = 'Summarizing...';
        summaryText.innerText = 'Analyzing content and generating summary...';
        summaryText.style.color = 'var(--text-muted)';

        try {
            //Send request to the FastAPI endpoint /summarize/
            const response = await fetch('/summarize/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                //Aligns with Pydantic model: dialogue: str
                body: JSON.stringify({ dialogue: dialogueInput })
            });

            if (!response.ok) {
                throw new Error('Failed to get response from server.');
            }

            const data = await response.json();
            
            //Update UI with the key returned by FastAPI
            summaryText.innerText = data.summary;
            summaryText.style.color = '#242c26'; 

        } catch (error) {
            console.error('Error:', error);
            summaryText.innerText = 'An error occurred while communicating with the backend server. Make sure Uvicorn is running.';
            summaryText.style.color = '#a33b3b'; 
        } finally {
            //Reset Button State
            submitButton.disabled = false;
            submitButton.innerText = 'Summarize';
        }
    });
    </script>
</body>
</html>
